name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: client
      - name: Check JS syntax
        run: find src -name '*.js' -exec node --check {} \;
      - run: npm run build
        working-directory: client
      - run: npm run test --if-present
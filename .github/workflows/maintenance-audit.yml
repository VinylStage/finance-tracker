name: Maintenance Audit

# ─────────────────────────────────────────────────────────────────
# scripts/research-issue.mjs (로컬 Ollama 자료조사)는 GitHub이 호스팅하는
# 러너에서 localhost:11434(Ollama)에 접근할 수 없어 여기서 자동 트리거하지
# 않습니다. 아래는 참고용 트리거 초안이며 의도적으로 비활성화되어 있습니다.
# self-hosted runner(로컬 Mac 등, Ollama가 실제로 떠 있는 머신)를 등록하면
# 주석을 해제해 사용할 수 있습니다.
#
#   on:
#     issues:
#       types: [labeled]
#
#   jobs:
#     research:
#       if: |
#         github.event.label.name == 'status:planning' &&
#         !contains(github.event.issue.labels.*.name, '자료조사완료')
#       runs-on: self-hosted   # Ollama가 실행 중인 로컬 러너 필요
#       steps:
#         - uses: actions/checkout@v4
#         - run: node scripts/research-issue.mjs ${{ github.event.issue.number }}
#         - run: gh issue edit ${{ github.event.issue.number }} --add-label "자료조사완료"
#           env:
#             GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#
# 그때까지는 로컬에서 직접 실행하세요:
#   node scripts/research-issue.mjs <issue-number> [model]
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run maintenance audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node .github/scripts/maintenance-audit.js
